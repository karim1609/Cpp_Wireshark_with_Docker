services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wirescope_app
    volumes:
      - ./:/app
    working_dir: /app
    ports:
      - "5901:5900"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    command: >
      bash -lc "
      export DISPLAY=:99;
      export QT_QPA_PLATFORM=xcb;
      Xvfb :99 -screen 0 1280x720x24 -nolisten tcp &
      x11vnc -display :99 -forever -nopw -listen 0.0.0.0 -rfbport 5900 -shared -xkb &
      cmake -S . -B build &&
      cmake --build build -j &&
      ./build/WireScope
      "
